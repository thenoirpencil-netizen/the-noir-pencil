backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "posts"
    label: "Journal Posts"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}.html"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category Label", name: "category", widget: "string", hint: "e.g. Editing Basics, Writing Habits" }
      - { label: "Preview Text", name: "preview", widget: "text", hint: "Short description shown on the journal page" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
